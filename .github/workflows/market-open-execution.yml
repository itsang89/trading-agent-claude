name: Trading Agent — Market Open Execution

on:
  schedule:
    - cron: '45 13 * * 1-5'  # 9:45 AM ET (EDT = UTC-4), Mon–Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_BASE_URL: https://paper-api.alpaca.markets/v2
      EXPERIMENT_START_DATE: 2026-04-28
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Trading Agent Bot"
          git config user.email "trading-agent@users.noreply.github.com"

      - name: Run market-open execution routine
        run: bash scripts/run-routine.sh market-open-execution

      - name: Push any uncommitted changes (fallback)
        if: always()
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "execution: $(date +%Y-%m-%d) [ci-fallback]"
          git push || true
